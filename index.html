<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Work 9</title>
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#252B42] text-white">
<header class="flex flex-col p-6.25 items-center gap-15 lg:max-w-300 lg:m-auto lg:justify-between lg:flex-row">
    <div class="flex justify-between w-full items-center">
        <h1 class="font-bold text-[26px]">BrandName</h1>
        <div class="flex gap-5 lg:hidden">
            <i class="fa-solid fa-magnifying-glass" style="color: #ffffff;"></i>
            <i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i>
            <i class="fa-solid fa-bars" style="color: #ffffff;"></i>
        </div>
    </div>
    <nav class="flex flex-col gap-5 text-[30px] items-center lg:flex-row lg:text-[18px]">
        <p>Home</p>
        <p>Product</p>
        <p>Pricing</p>
        <p>Contact</p>
    </nav>
    <div class="hidden lg:flex items-center justify-end w-[250%]">
        <button class="px-10 font-bold">Login</button>
        <button class="py-4 px-6 font-bold rounded-[5px] bg-[#23A6F0]">Become a member</button>
    </div>
</header>
<section class="flex flex-col gap-10 py-25 px-6.25 max-w-300 m-auto lg:flex-row lg:justify-between">
    <aside class="flex flex-col gap-8 text-center items-center lg:text-start lg:items-start lg:w-[40%]">
        <h2 class="text-[46px] font-bold lg:text-[60px]">Financial Assistance With True Purpose</h2>
        <p class="text-[29px] text-center lg:text-start">We know how large objects will act, but things on a small scale.</p>
        <div class="flex flex-col font-bold gap-5 items-center lg:flex-row">
            <button class="py-2.5 px-9 bg-[#23A6F0] rounded-[37px]">Get Quote Now</button>
            <button class="py-2.5 px-7 bg-[#00000000] border border-white rounded-[37px] ">Learn More</button>
        </div>
    </aside>
    <img class="lg:w-[45%]" src="src/img/section1/img.png" alt="">
</section>


</body>
</html>
